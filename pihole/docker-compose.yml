version: "3.9"

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    hostname: pihole
    restart: unless-stopped

    environment:
      TZ: America/New_York
      WEBPASSWORD: password
      DNSMASQ_USER: pihole
      FTL_CMD: no-daemon

    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d

    dns:
      - 192.168.68.142
      - 1.1.1.1

    ports:
      - "192.168.68.142:53:53/tcp"
      - "192.168.68.142:53:53/udp"
      - "192.168.68.142:80:80"
